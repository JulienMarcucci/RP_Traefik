version: "3.8"


services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: always
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.mediaschool.local`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"


  grafana:
    container_name: grafana
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    volumes:
      - ./Docker/grafana.yml:/etc/grafana/provisioning/datasources/datasource.yaml
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=password
    networks:
      - proxy
    ports:
      - "3000:3000"  
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.mediaschool.local`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"


  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    volumes:
      - ./Docker/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - proxy
    ports:
      - "9090:9090"  
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.mediaschool.local`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"


  dokuwiki:
    image: lscr.io/linuxserver/dokuwiki:latest
    container_name: dokuwiki
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - dokuwiki-data:/config
    networks:
      - proxy
    ports:
      - "8081:80"  
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dokuwiki.rule=Host(`wiki.mediaschool.local`)"
      - "traefik.http.routers.dokuwiki.entrypoints=web"
      - "traefik.http.services.dokuwiki.loadbalancer.server.port=80"


volumes:
  grafana-data:
  dokuwiki-data:


networks:
  proxy:
    driver: bridge


